<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>whisper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="titlebar" data-tauri-drag-region>
    <span class="title" data-tauri-drag-region>whisper</span>
    <div class="titlebar-controls">
      <button id="btn-minimize" class="win-btn" aria-label="Minimize">&#x2500;</button>
      <button id="btn-close" class="win-btn close" aria-label="Close">&#x2715;</button>
    </div>
  </div>

  <div class="app">
    <canvas id="visualizer"></canvas>

    <div class="center">
      <button id="record-btn" class="record-btn" aria-label="Record">
        <div id="mic-icon" class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </div>
        <div id="stop-icon" class="btn-icon hidden">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
        </div>
      </button>
      <p id="status" class="status">ready</p>
    </div>

    <div id="output" class="output hidden">
      <p id="output-text"></p>
    </div>

    <div class="footer">
      <span class="hotkey">hold Ctrl+Shift+Space</span>
      <button id="btn-settings" class="icon-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-overlay" id="settings-overlay"></div>
    <div class="settings-content">
      <h2>settings</h2>
      <label for="api-key-input">groq api key</label>
      <input id="api-key-input" type="password" placeholder="gsk_..." spellcheck="false" autocomplete="off">
      <div class="settings-actions">
        <button id="btn-save-key" class="btn-primary">save</button>
        <button id="btn-cancel-settings" class="btn-ghost">cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
